services:
  postgres:
    image: postgres:16-alpine
    container_name: corp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corpmessenger
      POSTGRES_USER: corpmessenger
      POSTGRES_PASSWORD: corpmessenger_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U corpmessenger']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: corp_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: corp_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: corp_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: corpmessenger
      DB_PASSWORD: corpmessenger_secret
      DB_NAME: corpmessenger
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: corpmessenger
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      APP_PORT: 3000
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://korpmes.ru/api}
      TURN_URL: turn:${SERVER_PUBLIC_IP:-localhost}:3478
      TURN_USERNAME: ${TURN_USERNAME:-turnuser}
      TURN_PASSWORD: ${TURN_PASSWORD:-turnpassword}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    container_name: corp_web
    restart: unless-stopped
    networks:
      - default
      - shared-web
    depends_on:
      - api

  coturn:
    image: coturn/coturn:4.6.2
    container_name: corp_coturn
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"
    command: "-n --log-file=stdout --no-tls --no-dtls --listening-ip=0.0.0.0 --listening-port=3478 --external-ip=${SERVER_PUBLIC_IP} --lt-cred-mech --realm=corpmessenger --user=${TURN_USERNAME:-turnuser}:${TURN_PASSWORD:-turnpassword} --fingerprint --min-port=49152 --max-port=49200"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  shared-web:
    external: true
