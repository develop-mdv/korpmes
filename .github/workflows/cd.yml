name: CD — Auto Deploy on Push

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - 'infrastructure/docker/**'
      - '.github/workflows/**'

jobs:
  deploy:
    name: Rolling Update (api + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy updated containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            DEPLOY_DIR="/opt/korpmes"

            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "ERROR: $DEPLOY_DIR not found. Run the Deploy workflow first."
              exit 1
            fi

            echo "=== Pulling latest code ==="
            cd "$DEPLOY_DIR"
            # Retry git fetch to survive transient GitHub 5xx / RPC failures
            fetch_ok=0
            for attempt in 1 2 3 4 5; do
              if git fetch --prune origin; then
                fetch_ok=1
                break
              fi
              echo "git fetch failed (attempt ${attempt}/5), retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            done
            if [ "$fetch_ok" -ne 1 ]; then
              echo "ERROR: git fetch origin failed after 5 attempts"
              exit 1
            fi
            git reset --hard origin/main

            echo "=== Patching .env with TURN/WebRTC settings ==="
            # Add TURN vars if not already present (idempotent)
            grep -q "^SERVER_PUBLIC_IP=" .env 2>/dev/null || echo "SERVER_PUBLIC_IP=${{ secrets.SERVER_HOST }}" >> .env
            grep -q "^TURN_URL=" .env 2>/dev/null || echo "TURN_URL=turn:${{ secrets.SERVER_HOST }}:3478" >> .env
            grep -q "^TURN_USERNAME=" .env 2>/dev/null || echo "TURN_USERNAME=${TURN_USERNAME:-turnuser}" >> .env
            grep -q "^TURN_PASSWORD=" .env 2>/dev/null || echo "TURN_PASSWORD=${TURN_PASSWORD:-turnpassword}" >> .env

            echo "=== Rebuilding api and web containers ==="
            docker compose build --no-cache api web

            echo "=== Restarting api and web (zero-touch for databases) ==="
            docker compose up -d --no-deps api web

            echo "=== Restarting coturn if docker-compose.yml changed ==="
            docker compose up -d --no-deps coturn

            echo "=== Waiting for API to be healthy ==="
            for i in $(seq 1 24); do
              if docker compose exec -T api wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q "ok"; then
                echo "API healthy after ${i}x5s"
                break
              fi
              echo "Attempt $i/24..."
              sleep 5
            done

            echo "=== Running pending migrations ==="
            docker compose exec -T api npx typeorm migration:run \
              -d dist/apps/api/src/database/typeorm.datasource.js \
              || echo "No pending migrations"

            echo "=== Status ==="
            docker compose ps
