name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Email for Let''s Encrypt certificate'
        required: true
        default: 'admin@korpmes.ru'

jobs:
  deploy:
    name: Initial Server Setup & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Provision server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "=== [1/8] Installing required packages ==="
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq

            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            else
              echo "Docker already installed: $(docker --version)"
            fi

            if ! docker compose version &>/dev/null; then
              apt-get install -y -qq docker-compose-plugin
            else
              echo "Docker Compose already installed: $(docker compose version)"
            fi

            if ! command -v certbot &>/dev/null; then
              apt-get install -y -qq certbot
            else
              echo "Certbot already installed: $(certbot --version)"
            fi

            echo "=== [2/8] Cloning / updating repository ==="
            DEPLOY_DIR="/opt/korpmes"
            if [ -d "$DEPLOY_DIR/.git" ]; then
              cd "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/main
              echo "Repository updated"
            else
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              echo "Repository cloned"
            fi

            echo "=== [3/8] Setting up shared Docker network ==="
            docker network create shared-web 2>/dev/null || echo "Network shared-web already exists"
            docker network connect shared-web tasktracker-nginx-1 2>/dev/null || echo "tasktracker-nginx-1 already on shared-web"

            echo "=== [4/8] Writing .env file ==="
            cat > "$DEPLOY_DIR/.env" <<ENVEOF
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            NODE_ENV=production
            APP_URL=https://korpmes.ru
            WEB_URL=https://korpmes.ru
            CORS_ORIGINS=https://korpmes.ru
            ENVEOF
            chmod 600 "$DEPLOY_DIR/.env"

            echo "=== [5/8] Obtaining SSL certificate for korpmes.ru ==="
            CERTBOT_WEBROOT="/var/lib/docker/volumes/tasktracker_certbot_webroot/_data"
            if [ -f "/etc/letsencrypt/live/korpmes.ru/fullchain.pem" ]; then
              echo "Certificate already exists, renewing if needed..."
              certbot renew --quiet
            else
              certbot certonly \
                --webroot \
                -w "$CERTBOT_WEBROOT" \
                -d korpmes.ru \
                -d www.korpmes.ru \
                --non-interactive \
                --agree-tos \
                --email ${{ github.event.inputs.admin_email }}
            fi

            NGINX_CERTS_DIR="/root/TaskTracker/nginx/certs/live/korpmes.ru"
            mkdir -p "$NGINX_CERTS_DIR"
            cp /etc/letsencrypt/live/korpmes.ru/fullchain.pem "$NGINX_CERTS_DIR/"
            cp /etc/letsencrypt/live/korpmes.ru/privkey.pem  "$NGINX_CERTS_DIR/"
            cp /etc/letsencrypt/live/korpmes.ru/chain.pem    "$NGINX_CERTS_DIR/" 2>/dev/null || true
            echo "Certs copied to $NGINX_CERTS_DIR"

            echo "=== [6/8] Patching tasktracker nginx config with korpmes.ru ==="
            NGINX_CONF="/root/TaskTracker/nginx/active.conf"
            BLOCKS_FILE="$DEPLOY_DIR/infrastructure/nginx/korpmes-server-blocks.conf"
            bash "$DEPLOY_DIR/infrastructure/nginx/patch-nginx.sh" "$NGINX_CONF" "$BLOCKS_FILE"

            docker exec tasktracker-nginx-1 nginx -t
            docker exec tasktracker-nginx-1 nginx -s reload
            echo "tasktracker-nginx-1 reloaded"

            echo "=== [7/8] Starting Docker services ==="
            cd "$DEPLOY_DIR"
            docker compose pull --quiet postgres redis minio coturn
            docker compose up -d --build

            if ! crontab -l 2>/dev/null | grep -q "certbot renew"; then
              (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet && cp /etc/letsencrypt/live/korpmes.ru/*.pem /root/TaskTracker/nginx/certs/live/korpmes.ru/ && docker exec tasktracker-nginx-1 nginx -s reload") | crontab -
              echo "Certbot renewal cron added"
            fi

            echo "=== [8/8] Running database migrations ==="
            for i in $(seq 1 30); do
              if docker compose exec -T api wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q "ok"; then
                echo "API is ready"
                break
              fi
              echo "Attempt $i/30: waiting 5s..."
              sleep 5
            done

            docker compose exec -T api node node_modules/.bin/typeorm \
              migration:run \
              -d dist/database/typeorm.datasource.js \
              || echo "WARNING: Migrations failed or no pending migrations"

            echo "=== Deployment complete ==="
            docker compose ps
            echo "Web: https://korpmes.ru"
            echo "API: https://korpmes.ru/api"
