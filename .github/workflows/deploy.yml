name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Email for Let''s Encrypt certificate'
        required: true
        default: 'admin@korpmes.ru'

jobs:
  deploy:
    name: Initial Server Setup & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Provision server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "=== [1/9] Installing required packages ==="
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq

            # Install Docker if missing
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            else
              echo "Docker already installed: $(docker --version)"
            fi

            # Install Docker Compose plugin if missing
            if ! docker compose version &>/dev/null; then
              echo "Installing Docker Compose plugin..."
              apt-get install -y -qq docker-compose-plugin
            else
              echo "Docker Compose already installed: $(docker compose version)"
            fi

            # Install nginx if missing
            if ! command -v nginx &>/dev/null; then
              echo "Installing nginx..."
              apt-get install -y -qq nginx
              systemctl enable nginx
              systemctl start nginx
            else
              echo "Nginx already installed: $(nginx -v 2>&1)"
            fi

            # Install certbot if missing
            if ! command -v certbot &>/dev/null; then
              echo "Installing certbot..."
              apt-get install -y -qq certbot python3-certbot-nginx
            else
              echo "Certbot already installed: $(certbot --version)"
            fi

            echo "=== [2/9] Cloning / updating repository ==="
            DEPLOY_DIR="/opt/korpmes"
            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "Repository exists, pulling latest..."
              cd "$DEPLOY_DIR"
              git fetch origin
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi
            cd "$DEPLOY_DIR"

            echo "=== [3/9] Finding free port for web container ==="
            find_free_port() {
              for port in 8080 8081 8082 8083 8084 8085; do
                if ! ss -tlnp | grep -q ":$port "; then
                  echo "$port"
                  return 0
                fi
              done
              echo "ERROR: No free port found in range 8080-8085" >&2
              return 1
            }
            WEB_PORT=$(find_free_port)
            echo "Selected web port: $WEB_PORT"

            # Check MinIO ports (non-fatal, just warn)
            for port in 9000 9001; do
              if ss -tlnp | grep -q ":$port "; then
                echo "WARNING: Port $port is already in use. MinIO may conflict."
              fi
            done

            echo "=== [4/9] Writing .env file ==="
            cat > "$DEPLOY_DIR/.env" <<EOF
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            WEB_PORT=${WEB_PORT}
            NODE_ENV=production
            APP_URL=https://korpmes.ru
            WEB_URL=https://korpmes.ru
            CORS_ORIGINS=https://korpmes.ru
            EOF
            chmod 600 "$DEPLOY_DIR/.env"

            echo "=== [5/9] Setting up nginx (HTTP-only for certbot challenge) ==="
            mkdir -p /var/www/certbot

            cat > /etc/nginx/sites-available/korpmes.conf <<'NGINX'
            server {
                listen 80;
                server_name korpmes.ru www.korpmes.ru;

                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }

                location / {
                    return 301 https://$host$request_uri;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/korpmes.conf /etc/nginx/sites-enabled/korpmes.conf

            # Remove default nginx site if present to avoid port conflicts
            rm -f /etc/nginx/sites-enabled/default

            nginx -t && systemctl reload nginx

            echo "=== [6/9] Obtaining SSL certificate ==="
            if [ -f "/etc/letsencrypt/live/korpmes.ru/fullchain.pem" ]; then
              echo "Certificate already exists, renewing if needed..."
              certbot renew --quiet
            else
              certbot certonly \
                --webroot \
                -w /var/www/certbot \
                -d korpmes.ru \
                -d www.korpmes.ru \
                --non-interactive \
                --agree-tos \
                --email ${{ github.event.inputs.admin_email }}
            fi

            echo "=== [7/9] Writing final nginx HTTPS config ==="
            sed "s/WEB_PORT_PLACEHOLDER/${WEB_PORT}/g" \
              "$DEPLOY_DIR/infrastructure/nginx/korpmes.conf" \
              > /etc/nginx/sites-available/korpmes.conf

            nginx -t && systemctl reload nginx

            echo "=== [8/9] Starting Docker services ==="
            cd "$DEPLOY_DIR"

            # Set up certbot auto-renewal cron (if not already set)
            if ! crontab -l 2>/dev/null | grep -q "certbot renew"; then
              (crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --quiet && systemctl reload nginx") | crontab -
              echo "Certbot renewal cron added"
            fi

            docker compose pull --quiet postgres redis minio coturn
            docker compose up -d --build

            echo "=== [9/9] Running database migrations ==="
            echo "Waiting for API to be ready..."
            for i in $(seq 1 30); do
              if docker compose exec -T api wget -qO- http://localhost:3000/api/health 2>/dev/null | grep -q "ok"; then
                echo "API is ready"
                break
              fi
              echo "Attempt $i/30: API not ready yet, waiting 5s..."
              sleep 5
            done

            # Run migrations (TypeORM CLI from compiled dist)
            docker compose exec -T api node node_modules/.bin/typeorm \
              migration:run \
              -d dist/database/typeorm.datasource.js \
              || echo "WARNING: Migrations failed or no pending migrations"

            echo ""
            echo "=== Deployment complete ==="
            docker compose ps
            echo ""
            echo "Web: https://korpmes.ru"
            echo "API: https://korpmes.ru/api"
