# HTTP — Let's Encrypt challenge + redirect to HTTPS
server {
    listen 80;
    server_name korpmes.ru www.korpmes.ru;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name korpmes.ru www.korpmes.ru;

    ssl_certificate     /etc/letsencrypt/live/korpmes.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/korpmes.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Allow large file uploads (messenger attachments). 0 = no proxy-level cap;
    # the real ceiling is enforced by the API (MAX_FILE_SIZE_BYTES).
    client_max_body_size 0;

    # Proxy to Docker web container (port set by deploy script)
    location / {
        proxy_pass         http://127.0.0.1:WEB_PORT_PLACEHOLDER;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_request_buffering off;
    }
}
